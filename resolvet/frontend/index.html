<!DOCTYPE html>
<html>
<head>
  <title>Resolvet Ticket System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Resolvet Ticket System</h1>

  <section>
    <h2>Create Ticket</h2>
    <form id="ticketForm">
      <input type="text" id="title" placeholder="Title" required>
      <textarea id="description" placeholder="Description"></textarea>
      <button type="submit">Add Ticket</button>
    </form>
  </section>

  <section>
    <h2>Tickets</h2>
    <table id="ticketTable">
      <thead>
        <tr>
          <th>Title</th><th>Description</th><th>Status</th><th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="app.js"></script>
</body>
</html>
